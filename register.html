<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Register • CodeNest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">

    <h1>CodeNest</h1>

    <div class="auth-card">

        <h2>Create account</h2>

        <input
            type="text"
            id="registerUser"
            placeholder="Username"
        >

        <input
            type="password"
            id="registerPass"
            placeholder="Password"
        >

        <button onclick="register()">
            Register
        </button>

        <p>
            Already have account?
            <a href="login.html">
                Login
            </a>
        </p>

    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
