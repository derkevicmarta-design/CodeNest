<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>
        <div>
            <button id="saveBtn">Save</button>
            <a href="index.html"><button type="button">Exit</button></a>
        </div>
    </div>

    <div class="terminal-info">
        <h2 id="title">Calculator</h2>
        <p id="desc">Simple calculator</p>
    </div>

    <div class="editor-tabs">
        <button class="file-tab active" data-file="html">HTML</button>
        <button class="file-tab" data-file="css">CSS</button>
        <button class="file-tab" data-file="js">JS</button>
    </div>

    <div class="editor">
        <textarea id="html" class="code"></textarea>
        <textarea id="css" class="code" style="display:none"></textarea>
        <textarea id="js" class="code" style="display:none"></textarea>
    </div>

    <button class="run-btn" id="runBtn">Run Code</button>

    <iframe id="preview"></iframe>

</div>

<script>
let index = localStorage.getItem("openProject");
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let project = projects[index];

const defaultHtml = `<h1>Calculator</h1>
<input id="a" placeholder="First number">
<input id="b" placeholder="Second number">
<button onclick="sum()">+</button>
<h2 id="result"></h2>`;

const defaultCss = `body {
    font-family: Arial;
    text-align: center;
    padding: 40px;
}

input {
    padding: 10px;
    margin: 5px;
}

button {
    padding: 10px 15px;
}`;

const defaultJs = `function sum() {
    let a = Number(document.getElementById("a").value);
    let b = Number(document.getElementById("b").value);
    document.getElementById("result").innerText = a + b;
}`;

document.getElementById("html").value = project?.html || defaultHtml;
document.getElementById("css").value = project?.css || defaultCss;
document.getElementById("js").value = project?.js || defaultJs;

if (project) {
    document.getElementById("title").innerText = project.name;
    document.getElementById("desc").innerText = project.desc;
}

document.querySelectorAll(".file-tab").forEach(btn => {
    btn.addEventListener("click", function () {
        document.querySelectorAll(".code").forEach(area => {
            area.style.display = "none";
        });

        document.getElementById(this.dataset.file).style.display = "block";

        document.querySelectorAll(".file-tab").forEach(tab => {
            tab.classList.remove("active");
        });

        this.classList.add("active");
    });
});

document.getElementById("runBtn").addEventListener("click", function () {
    let html = document.getElementById("html").value;
    let css = document.getElementById("css").value;
    let js = document.getElementById("js").value;

    document.getElementById("preview").srcdoc =
        "<!DOCTYPE html><html><head><style>" +
        css +
        "</style></head><body>" +
        html +
        "<script>" +
        js +
        "<\/script></body></html>";
});

document.getElementById("saveBtn").addEventListener("click", function () {
    if (project) {
        projects[index].html = document.getElementById("html").value;
        projects[index].css = document.getElementById("css").value;
        projects[index].js = document.getElementById("js").value;
        localStorage.setItem("projects", JSON.stringify(projects));
    }

    alert("Saved");
});
</script>

</body>
</html>
