<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>
        <div>
            <button id="saveBtn">Save</button>
            <a href="index.html"><button type="button">Exit</button></a>
        </div>
    </div>

    <div class="terminal-info">
        <h2 id="title">Calculator</h2>
        <p id="desc">Simple calculator</p>
    </div>

<div class="editor-tabs">
    <button type="button" class="file-tab active" onclick="showCodeTab('html', this)">HTML</button>
    <button type="button" class="file-tab" onclick="showCodeTab('css', this)">CSS</button>
    <button type="button" class="file-tab" onclick="showCodeTab('js', this)">JS</button>
</div>

    <div class="editor">
        <textarea id="html" class="code"></textarea>
        <textarea id="css" class="code" style="display:none"></textarea>
        <textarea id="js" class="code" style="display:none"></textarea>
    </div>

    <button class="run-btn" id="runBtn">Run Code</button>

    <iframe id="preview"></iframe>

</div>

<script>

let htmlArea = document.getElementById("html");
let cssArea = document.getElementById("css");
let jsArea = document.getElementById("js");

const defaultHTML = `
<h1>Calculator</h1>

<input id="a" placeholder="First number">
<input id="b" placeholder="Second number">

<button onclick="sum()">+</button>

<h2 id="result"></h2>
`;

const defaultCSS = `
body{
font-family:Arial;
text-align:center;
padding:30px;
}
`;

const defaultJS = `
function sum(){

let a=Number(document.getElementById("a").value);
let b=Number(document.getElementById("b").value);

document.getElementById("result").innerText=a+b;

}
`;

htmlArea.value = defaultHTML;
cssArea.value = defaultCSS;
jsArea.value = defaultJS;

document.querySelectorAll(".file-tab")
.forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".code")
.forEach(x=>x.style.display="none");

document.getElementById(
btn.dataset.file
).style.display="block";

});

});

document.getElementById("runBtn")
.addEventListener("click",()=>{

document.getElementById(
"preview"
).srcdoc =

`
<html>
<head>

<style>

${cssArea.value}

</style>

</head>

<body>

${htmlArea.value}

<script>

${jsArea.value}

<\/script>

</body>

</html>



function showCodeTab(tabName, button) {
    document.getElementById("html").style.display = "none";
    document.getElementById("css").style.display = "none";
    document.getElementById("js").style.display = "none";

    document.getElementById(tabName).style.display = "block";

    document.querySelectorAll(".file-tab").forEach(btn => {
        btn.classList.remove("active");
    });

    button.classList.add("active");
}
</script>

</body>
</html>
