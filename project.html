<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>
        <div>
            <button onclick="saveProject()">Save</button>
            <button onclick="goBack()">Exit</button>
        </div>
    </div>

    <div class="terminal-info">
        <h2 id="title"></h2>
        <p id="desc"></p>
    </div>

    <div class="editor-tabs">
        <button class="file-tab active" onclick="switchFile('html', this)">HTML</button>
        <button class="file-tab" onclick="switchFile('css', this)">CSS</button>
        <button class="file-tab" onclick="switchFile('js', this)">JS</button>
    </div>

    <div class="editor">
        <textarea id="html" class="code"></textarea>
        <textarea id="css" class="code" style="display:none"></textarea>
        <textarea id="js" class="code" style="display:none"></textarea>
    </div>

    <button class="run-btn" onclick="runCode()">Run Code</button>

    <iframe id="preview"></iframe>

</div>

<script>
let index = localStorage.getItem("openProject");
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let project = projects[index];

function el(id) {
    return document.getElementById(id);
}

if (!project) {
    document.body.innerHTML = "<h1>Проєкт не знайдено</h1>";
} else {
    el("title").innerText = project.name;
    el("desc").innerText = project.desc;

    el("html").value = project.html || "";
    el("css").value = project.css || "";
    el("js").value = project.js || "";
}

function switchFile(file, btn) {
    document.querySelectorAll(".code").forEach(area => {
        area.style.display = "none";
    });

    el(file).style.display = "block";

    document.querySelectorAll(".file-tab").forEach(tab => {
        tab.classList.remove("active");
    });

    btn.classList.add("active");
}

function runCode() {
    let html = el("html").value;
    let css = el("css").value;
    let js = el("js").value;

    el("preview").srcdoc = `
        <!DOCTYPE html>
        <html>
        <head>
            <style>${css}</style>
        </head>
        <body>
            ${html}
            <script>${js}<\/script>
        </body>
        </html>
    `;
}

function saveProject() {
    projects[index].html = el("html").value;
    projects[index].css = el("css").value;
    projects[index].js = el("js").value;

    localStorage.setItem("projects", JSON.stringify(projects));

    alert("Saved");
}

function goBack() {
    window.location.href = "index.html";
}

runCode();
</script>

</body>
</html>
