<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>
        <div>
            <button onclick="saveProject()">Save</button>
            <button onclick="goBack()">Exit</button>
        </div>
    </div>

    <div class="terminal-info">
        <h2 id="title"></h2>
        <p id="desc"></p>
    </div>

    <div class="editor-tabs">
        <button class="file-tab active" onclick="switchFile('html', this)">HTML</button>
        <button class="file-tab" onclick="switchFile('css', this)">CSS</button>
        <button class="file-tab" onclick="switchFile('js', this)">JS</button>
    </div>

    <div class="editor">
        <textarea id="html" class="code" placeholder="HTML..."></textarea>
        <textarea id="css" class="code" style="display:none" placeholder="CSS..."></textarea>
        <textarea id="js" class="code" style="display:none" placeholder="JavaScript..."></textarea>
    </div>

    <button class="run-btn" onclick="updatePreview()">
    Run Code
    </button>

<iframe id="preview"></iframe>

    <iframe id="preview"></iframe>

</div>

<script src="js/project.js"></script>

</body>
</html>
