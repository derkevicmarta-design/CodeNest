<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>

        <div>
            <button id="saveBtn" type="button">Save</button>

            <a href="index.html">
                <button type="button">Exit</button>
            </a>
        </div>
    </div>

    <div class="terminal-info">
        <h2 id="title"></h2>
        <p id="desc"></p>
    </div>

    <div class="editor-tabs">
        <button class="file-tab active" data-file="html">HTML</button>
        <button class="file-tab" data-file="css">CSS</button>
        <button class="file-tab" data-file="js">JS</button>
    </div>

    <div class="editor">
        <textarea id="html" class="code"></textarea>
        <textarea id="css" class="code" style="display:none"></textarea>
        <textarea id="js" class="code" style="display:none"></textarea>
    </div>

    <button class="run-btn" id="runBtn" type="button">
        Run Code
    </button>

    <iframe id="preview"></iframe>

</div>

<script>
let index = localStorage.getItem("openProject");
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let project = projects[index];

function el(id) {
    return document.getElementById(id);
}

if (!project) {
    document.body.innerHTML = "<h1>Проєкт не знайдено</h1>";
} else {
    el("title").innerText = project.name;
    el("desc").innerText = project.desc;

    el("html").value = project.html || "";
    el("css").value = project.css || "";
    el("js").value = project.js || "";
}

document.querySelectorAll(".file-tab").forEach(button => {
    button.addEventListener("click", function () {
        let file = this.dataset.file;

        document.querySelectorAll(".code").forEach(area => {
            area.style.display = "none";
        });

        el(file).style.display = "block";

        document.querySelectorAll(".file-tab").forEach(tab => {
            tab.classList.remove("active");
        });

        this.classList.add("active");
    });
});

document.getElementById("runBtn").addEventListener("click", function () {
    let html = document.getElementById("html").value;
    let css = document.getElementById("css").value;
    let js = document.getElementById("js").value;

    let fullCode =
        "<!DOCTYPE html>" +
        "<html>" +
        "<head>" +
        "<style>" + css + "</style>" +
        "</head>" +
        "<body>" +
        html +
        "<script>" + js + "<\/script>" +
        "</body>" +
        "</html>";

    document.getElementById("preview").srcdoc = fullCode;
});

document.getElementById("saveBtn").addEventListener("click", function () {
    projects[index].html = el("html").value;
    projects[index].css = el("css").value;
    projects[index].js = el("js").value;

    localStorage.setItem("projects", JSON.stringify(projects));

    alert("Saved");
});
</script>

</body>
</html>
