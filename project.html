<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>CodeNest Terminal</title>

<style>
body {
    background: #0d1117;
    color: white;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

.terminal {
    background: #161b22;
    padding: 20px;
    border-radius: 15px;
}

textarea {
    width: 100%;
    height: 250px;
    background: black;
    color: #39d353;
    padding: 10px;
    font-family: Consolas, monospace;
    border: none;
    border-radius: 10px;
}

.terminal-buttons {
    margin-top: 15px;
}

button {
    padding: 10px 18px;
    margin-right: 10px;
    border: none;
    border-radius: 10px;
    background: #238636;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}

#stopBtn {
    background: #da3633;
}

iframe {
    margin-top: 20px;
    width: 100%;
    height: 350px;
    background: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="terminal">
    <h2>CodeNest Terminal</h2>

    <textarea id="html">
<h1>Calculator</h1>

<input id="a" placeholder="First number">
<input id="b" placeholder="Second number">

<button onclick="showResult()">+</button>

<h2 id="result"></h2>

<h1>Calculator</h1>

<input id="a" placeholder="First number">

<input id="b" placeholder="Second number">

<button onclick="showResult()">+</button>

<h2 id="result"></h2>

<style>

body{
background:#0d1117;
color:#e6edf3;
font-family:Arial;
padding:40px;
text-align:center;
}

h1{
color:#39d353;
margin-bottom:30px;
}

input{

background:#161b22;
border:1px solid #30363d;

padding:12px;
margin:8px;

border-radius:10px;

color:white;

width:180px;

}

button{

background:#238636;
border:none;

padding:12px 18px;

border-radius:10px;

color:white;

font-weight:bold;

cursor:pointer;

}

button:hover{

background:#2ea043;

}

#result{

margin-top:30px;

font-size:28px;
color:#58a6ff;

}

</style>

&lt;script&gt;

function showResult(){

let a=
Number(
document.getElementById("a").value
);

let b=
Number(
document.getElementById("b").value
);

document.getElementById(
"result"
).innerText=
a+b;

}

&lt;/script&gt;

<div class="terminal-buttons">
    <button id="runBtn" type="button">▶ Run</button>
    <button id="stopBtn" type="button">■ Stop</button>

    <a href="index.html">
        <button type="button">Exit</button>
    </a>
</div>

<iframe id="preview"></iframe>

<script>
document.getElementById("runBtn").addEventListener("click", function () {
    let code = document.getElementById("html").value;
    document.getElementById("preview").srcdoc = code;
});

document.getElementById("stopBtn").addEventListener("click", function () {
    document.getElementById("preview").srcdoc = "";
});
</script>

</script>

</body>
</html>
