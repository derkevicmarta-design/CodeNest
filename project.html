<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>CodeNest Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="terminal">

    <div class="terminal-header">
        <span>CodeNest Terminal</span>
        <a href="index.html"><button>Exit</button></a>
    </div>

    <div class="editor">
        <textarea id="html" class="code">
<h1>Calculator</h1>

<input type="number" id="a" placeholder="First number">
<input type="number" id="b" placeholder="Second number">

<br><br>

<button onclick="alert(Number(document.getElementById('a').value) + Number(document.getElementById('b').value))">+</button>
<button onclick="alert(Number(document.getElementById('a').value) - Number(document.getElementById('b').value))">-</button>
<button onclick="alert(Number(document.getElementById('a').value) * Number(document.getElementById('b').value))">×</button>
<button onclick="alert(Number(document.getElementById('a').value) / Number(document.getElementById('b').value))">÷</button>
        </textarea>
    </div>

    <button onclick="runCode()" class="run-btn">Run Code</button>

    <iframe id="preview"></iframe>

</div>

<script>
function runCode() {
    let html = document.getElementById("html").value;
    document.getElementById("preview").srcdoc = html;
}
</script>

</body>
</html>
