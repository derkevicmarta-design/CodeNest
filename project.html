<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>CodeNest Terminal</title>

<style>

body{
background:#0d1117;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.terminal{
background:#161b22;
padding:20px;
border-radius:15px;
}

textarea{
width:100%;
height:250px;
background:black;
color:#39d353;
padding:10px;
font-family:Consolas;
border:none;
border-radius:10px;
}

button{
padding:10px 15px;
margin-top:15px;
cursor:pointer;
}

iframe{
margin-top:20px;
width:100%;
height:350px;
background:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="terminal">

<h2>CodeNest Terminal</h2>

<textarea id="html">

<h1>Calculator</h1>

<input id="a" placeholder="First number">

<input id="b" placeholder="Second number">

<button onclick="showResult()">+</button>

<h2 id="result"></h2>

<script>

function showResult(){

let a=
Number(
document.getElementById("a").value
);

let b=
Number(
document.getElementById("b").value
);

document.getElementById(
"result"
).innerText=
a+b;

}

</script>

</textarea>

<br>

<button id="runBtn">
Run Code
</button>

<a href="index.html">
<button>
Exit
</button>
</a>

<iframe id="preview"></iframe>

</div>

<script>

document
.getElementById("runBtn")
.addEventListener(
"click",
function(){

let code=
document
.getElementById(
"html"
)
.value;

document
.getElementById(
"preview"
)
.srcdoc=
code;

}
);

</script>

</body>
</html>
