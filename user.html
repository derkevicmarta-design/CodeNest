<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>User profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <h2 id="username"></h2>

    <a href="index.html"><button>← Back</button></a>
</header>

<div class="profile-container">

    <div class="profile-sidebar">

        <img id="avatarImg" class="avatar">

        <p id="bioText"></p>

        <button onclick="toggleFollow()">Follow / Unfollow</button>

        <p>
            Followers: <span id="followersCount"></span><br>
            Following: <span id="followingCount"></span>
        </p>

    </div>

    <div class="profile-main">

        <h3>Repositories</h3>
        <div id="userProjects"></div>

    </div>

</div>

<script src="js/user.js"></script>

</body>
</html>
