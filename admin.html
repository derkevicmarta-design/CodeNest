<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Admin • CodeNest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="left">
        <h2>CodeNest Admin</h2>
    </div>

    <div class="right">
        <a href="index.html"><button>All projects</button></a>
        <a href="pages/profile.html"><button>Profile</button></a>
        <a href="pages/contacts.html"><button>Contacts</button></a>
        <button onclick="localStorage.removeItem('currentUser'); window.location.href='pages/login.html';">
    Logout
</button>
    </div>
</header>

<section class="admin-page">
    <div class="admin-card">
        <h1>Admin panel</h1>
        <p>Тут відображаються заявки з контактної форми.</p>

        <div id="requestsList"></div>
    </div>
</section>

<script>

    let currentUser =
localStorage.getItem("currentUser");

if(
currentUser !== "Marta"
){

document.body.innerHTML=`

<div style="
padding:50px;
text-align:center;
color:white;
font-family:Arial;
">

<h1>
Access denied
</h1>

<p>
Only administrator can access this page
</p>

<a href="index.html">

<button>

Go back

</button>

</a>

</div>

`;

throw new Error(
"Access denied"
);

}
function renderRequests() {
    let list = document.getElementById("requestsList");
    let requests = JSON.parse(localStorage.getItem("contactRequests")) || [];

    list.innerHTML = "";
if (requests.length === 0) {

    list.innerHTML = `

    <div class="empty-box">

        <h2>No requests</h2>

        <p>
        Users have not submitted requests yet
        </p>

    </div>

    `;

    return;
}
}


function deleteRequest(index) {
    let requests = JSON.parse(localStorage.getItem("contactRequests")) || [];

    requests.splice(index, 1);

    localStorage.setItem("contactRequests", JSON.stringify(requests));

    renderRequests();
}

function logout() {
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}

renderRequests();
</script>

</body>
</html>
